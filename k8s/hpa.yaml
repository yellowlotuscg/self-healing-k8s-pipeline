# HorizontalPodAutoscaler. Optional for the demo but it closes the loop: now
# that pods have real resource REQUESTS, the HPA can actually compute
# utilization (it's a percentage of the request - which is why this was
# impossible during the incident when there were no requests at all).
#
# Scales 3..6 on CPU. min stays at 3 so the PDB's minAvailable:2 always has
# headroom. Conservative scale-down stabilization avoids flapping.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: echo-svc
  namespace: echo
  labels:
    app.kubernetes.io/name: echo-svc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: echo-svc
  minReplicas: 3
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
