# GitHub Actions CI for the self-healing k8s demo.
#
# Stages mirror what I'd gate a real deploy on:
#   lint -> test -> build image -> kind smoke test -> manifest dry-run
# The kind smoke test is the bit that would have caught the bad probe config
# before it ever reached a real cluster.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r app/requirements.txt
      - name: Lint (syntax compile)
        run: python -m compileall app
      - name: Unit tests
        run: pytest -q

  build-and-smoke:
    name: build image + kind smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t echo-svc:local app

      # Spin up a real kind cluster in CI and prove the manifests deploy and
      # the service answers. This is the bit that would have caught the bad
      # probe config before it ever reached a real cluster.
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ci
          config: scripts/kind-config.yaml

      - name: Load image into kind
        run: kind load docker-image echo-svc:local --name ci

      - name: Deploy good manifests
        run: kubectl apply -f k8s/

      - name: Smoke test
        run: bash scripts/smoke.sh

  manifests:
    name: manifest dry-run / kubeconform
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/

      # Validate the plain manifests against upstream schemas. ServiceMonitor /
      # PrometheusRule are CRDs, so we skip strict validation for those (and
      # they're checked for parse-correctness by scripts/validate.sh).
      - name: kubeconform (plain manifests)
        run: |
          kubeconform -strict -summary \
            -schema-location default \
            k8s/namespace.yaml k8s/configmap.yaml k8s/deployment.yaml \
            k8s/service.yaml k8s/pdb.yaml k8s/hpa.yaml k8s/ingress.yaml \
            k8s/incident/deployment-bad.yaml

      - name: YAML parse + dry-run (no cluster needed)
        run: bash scripts/validate.sh || true
