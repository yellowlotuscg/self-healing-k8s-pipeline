# kind cluster config used by the Makefile and the Ansible playbook.
# 3 nodes (1 control-plane + 2 workers) so PDBs, topology spread, and node
# drains are actually demonstrable. Control-plane exposes 80/443 for ingress.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
  - role: worker
